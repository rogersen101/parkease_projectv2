{% load crispy_forms_tags static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <!-- Logo -->
        <a
          class="navbar-brand d-flex align-items-center"
          href="{% url 'dashboard' %}"
        >
          <img
            src="{% static 'images/logo.png' %}"alt="Logo" width="40" class="me-2" />
          <span class="fw-bold text-white">ParkEase</span>
        </a>

        <!-- Toggle button (mobile) -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Navbar links -->
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <!-- Dashboard -->
            <li class="nav-item">
              <a class="nav-link active" href="{% url 'dashboard' %}"
                >Dashboard</a
              >
            </li>

            <!-- Admin -->
            <li class="nav-item">
              <a class="nav-link" href="{% url 'admin_dashboard' %}">Admin</a>
            </li>

            <li class="nav-item dropdown">
              <a
                class="nav-link dropdown-toggle"
                href="#"
                id="servicesDropdown"
                role="button"
                data-bs-toggle="dropdown"
              >
                Other Services
              </a>

              <ul class="dropdown-menu">
                <li>
                  <a class="dropdown-item" href="{% url 'tyre_service' %}">
                    🛞 Tyre Service
                  </a>
                </li>
                <li>
                  <a class="dropdown-item" href="{% url 'battery' %}">
                    🔋 Battery Service
                  </a>
                </li>
              </ul>
            </li>

            <!-- logout -->
            <li class="nav-item">
              <form method="POST" action="{% url 'logout' %}">
                {% csrf_token %}
                <button class="btn btn-danger ms-2">Logout</button>
              </form>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <div class="row">
        <div class="col-lg-2"></div>
        <div class="col-lg-8">
          <form method="POST" novalidate>
            {% csrf_token %} {{ form| crispy}}
            <button type="submit" class="btn btn-primary">Register</button>
          </form>
        </div>
        <div class="col-lg-2"></div>
      </div>
    </div>
  </body>
</html>
